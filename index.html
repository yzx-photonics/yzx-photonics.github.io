<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>武汉旸之芯科技有限公司</title>
  <meta name="description" content="武汉旸芯科技有限公司专注于三维光子芯片设计自动化平台。">
  <style>
    :root {
      color-scheme: light;
      --ink: #111827;
      --muted: #5b6472;
      --line: #d7dde7;
      --blue: #155eef;
      --bg: #f6f8fb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.7;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
    }

    .content {
      width: min(880px, 100%);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 48px;
      box-shadow: 0 18px 50px rgba(17, 24, 39, 0.08);
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--blue);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 6vw, 56px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .lead {
      margin: 24px 0 0;
      max-width: 720px;
      color: var(--muted);
      font-size: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-top: 36px;
    }

    .item {
      border-top: 3px solid var(--blue);
      padding-top: 14px;
    }

    .item h2 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .item p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .footer {
      margin-top: 40px;
      padding-top: 22px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 720px) {
      .content {
        padding: 32px 24px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .lead {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="content" aria-label="武汉旸芯科技有限公司简介">
      <p class="eyebrow">Yangxin Photonics</p>
      <h1>武汉旸芯科技有限公司</h1>
      <p class="lead">
        武汉旸芯科技有限公司专注于三维光子芯片设计自动化平台，面向光子芯片研发、工艺验证与测试反馈场景，探索从三维结构设计、路径生成到仿真分析的一体化工程流程。
      </p>

      <div class="grid">
        <div class="item">
          <h2>三维光子芯片</h2>
          <p>支持真正三维结构与空间光路设计，服务复杂光子器件研发。</p>
        </div>
        <div class="item">
          <h2>设计自动化</h2>
          <p>围绕建模、路径、仿真、校验与报告生成，提升工程效率。</p>
        </div>
        <div class="item">
          <h2>AI 原生工作流</h2>
          <p>以工程工具和智能 Agent 结合，推动光子芯片设计流程升级。</p>
        </div>
      </div>

      <div class="footer">
        官网测试页。更多公司介绍、产品内容与联系方式将陆续更新。
      </div>
    </section>
  </main>
</body>
</html>
